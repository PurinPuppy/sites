<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <link rel="icon" type="image/png" href="icon.png">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fff7cc, #ffeb99, #ffd580, #f5c07b);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      color: #5a381e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: 4.5em;
      margin-bottom: 50px;
      text-shadow: 0 6px 15px rgba(0,0,0,0.1);
      color: #5a381e;
      position: relative;
      z-index: 2;
    }

    .title-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 350px;
      opacity: 0.15;
      z-index: 1;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    .button {
      display: block;
      background: #fff3c4;
      color: #5a381e;
      text-decoration: none;
      padding: 15px 30px;
      margin: 15px;
      border-radius: 15px;
      font-size: 1.3em;
      font-weight: bold;
      transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border: 2px solid #d8b36c;
      z-index: 2;
      position: relative;
      cursor: pointer;
    }

    .button:hover {
      background: #ffe59e;
      transform: scale(1.05);
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    footer {
      position: absolute;
      bottom: 15px;
      font-size: 0.9em;
      color: rgba(90,56,30,0.7);
      z-index: 2;
    }
  </style>
</head>
<body>

  <img src="puringithub.png" alt="Purin Hub Logo" class="title-bg">
  <h1>Purin Hub</h1>

  <!-- Buttons use JS instead of <a> to open about:blank -->
  <div class="button" onclick="openBlank('https://purinpuppy.github.io/homework-help-V2/')">Drive Mad</div>
  <div class="button" onclick="openBlank('https://purinpuppy.github.io/homework-help/')">Cookie Clicker</div>
  <div class="button" onclick="openBlank('https://purinpuppy.github.io/the-possible/')">NautilusOS</div>
  <div class="button" onclick="openBlank('https://purinpuppy.github.io/Stickman-Hook/')">Stickman Hook</div>

  <footer>© 2025 Purin Hub</footer>

  <!-- Cloaked tab JavaScript -->
  <script>
    function openBlank(url) {
      const win = window.open("about:blank", "_blank");
      win.document.write(`
        <html>
          <head>
            <title>Loading...</title>
            <style>
              body, html { margin: 0; height: 100%; overflow: hidden; }
              iframe { width: 100%; height: 100%; border: none; }
            </style>
          </head>
          <body>
            <iframe src="${url}"></iframe>
          </body>
        </html>
      `);
    }
  </script>

</body>
</html>
